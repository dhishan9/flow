<html class="dark" lang="en">
<head>

    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Code to Flowchart | flow V1.0.2</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #252626; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484848; }
        
        /* CodeMirror container */
        #code-editor {
            height: 100%;
            width: 100%;
        }
        .CodeMirror {
            height: 100%;
            border-radius: 0.75rem;
        }
        
        /* Dark Mode Flowchart */
        html.dark .mermaid .node rect,
        html.dark .mermaid .node polygon,
        html.dark .mermaid .node circle,
        html.dark .mermaid .node path {
            fill: #131313 !important;
            stroke: #aec6ff !important;
            stroke-width: 1.5px !important;
        }

        html.dark .mermaid .node .label {
            color: #e7e5e4 !important;
            fill: #e7e5e4 !important;
        }

        html.dark .mermaid .edgePath path,
        html.dark .mermaid path.path { 
            stroke: #aec6ff !important; 
        } 
        html.dark .mermaid marker path { 
            fill: #aec6ff !important; 
            stroke: none !important; 
        }

        html.dark .mermaid .edgeLabel rect {
            fill: #131313 !important; 
            stroke: none !important;
        }
        html.dark .mermaid .edgeLabel,
        html.dark .mermaid .edgeLabel .label { 
            color: #aec6ff !important; 
            fill: #aec6ff !important;
            background-color: transparent !important; 
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        /* Make source code section scrollable */
        section:first-of-type {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        section:first-of-type .relative.flex-1.group {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        #code-editor {
            height: 100%;
            overflow: auto;
        }
        .CodeMirror {
            height: 100%;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden h-screen flex flex-col">

            </button>
            <span class="text-xl font-bold tracking-tighter text-[#aec6ff] ml-2">Code to Flowchart</span>
        </div>

            <div class="p-6" style="min-width: 16rem;">
                <button id="newProjectBtn" class="w-full bg-primary text-on-primary font-bold py-3 rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-all text-xs uppercase tracking-widest shadow-lg shadow-primary/10">
                    <span class="material-symbols-outlined text-[18px]">add</span> New Project

            </div>
            <div class="flex-1 overflow-y-auto px-4 pb-8" style="min-width: 16rem;">
                <div class="space-y-4">

                        <span class="text-[9px] text-primary/60" id="historyCount"></span>
                    </div>
                    <div id="historyContainer" class="space-y-1 max-h-[60vh] overflow-y-auto">
                        <!-- History items -->
                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-outline-variant/5" style="min-width: 16rem;">
                <div class="mb-2">
                    <h2 class="text-sm font-black text-white">flow</h2>
                    <p class="text-[10px] text-on-surface-variant font-medium">V1.0.2</p>

        <main class="flex-1 flex overflow-hidden">
            <div class="flex flex-col md:flex-row w-full h-full bg-surface">

                    <div class="flex items-center justify-between mb-2">

                    </div>
                    <div class="relative flex-1 group">
                        <div class="absolute inset-0 bg-primary/5 opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none rounded-xl"></div>
                        <!-- CodeMirror container -->
                        <div id="code-editor" class="w-full h-full rounded-xl overflow-hidden border border-outline-variant/10"></div>
                        <!-- Hidden textarea to keep compatibility with existing app.js -->
                        <textarea id="inputCode" style="display: none;">def factorial_recursive(n):
    if n < 0:
        return "Not defined for negative numbers"
    elif n == 0 or n == 1:
        return 1
    else:
        return n * factorial_recursive(n - 1)

number = 5
print(f"The factorial of {number} is {factorial_recursive(number)}")</textarea>
                    </div>
                    <div class="flex items-center gap-3 pt-2">
                        <div class="relative flex-1">

    <script src="https://cdn.jsdelivr.net/npm/web-tree-sitter@0.20.8/tree-sitter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.2.4/dist/mermaid.min.js"></script>
    <script src="app.js"></script>

    <!-- CodeMirror 5 initialization (must run after app.js) -->
    <script>
    (function() {
        let editor = null;
        const textarea = document.getElementById('inputCode');
        const langSelect = document.getElementById('langSelect');

        function initEditor() {
            if (!textarea) return;
            let initialCode = textarea.value;
            let initialLang = langSelect.value;

            const mode = initialLang === 'python' ? 'python' : 'text/x-csrc';
            const editorElement = document.getElementById('code-editor');
            if (!editorElement) return;

            editor = CodeMirror(editorElement, {
                value: initialCode,
                mode: mode,
                theme: 'material-darker',
                lineNumbers: true,
                autoCloseBrackets: true,
                indentUnit: 4,
                lineWrapping: true
            });
            window.globalEditor = editor;

            editor.on('change', () => {
                textarea.value = editor.getValue();
                textarea.dispatchEvent(new Event('input'));
            });
        }

        // Expose a function to update the editor from outside (app.js)
        window.updateEditorContent = function(code, language) {
            if (!editor) {
                // Editor not ready yet – store for later init
                window._pendingEditorUpdate = { code, language };
                return;
            }
            const mode = language === 'python' ? 'python' : 'text/x-csrc';
            editor.setOption('mode', mode);
            if (editor.getValue() !== code) {
                editor.setValue(code);
            }
            // Also update the hidden textarea
            if (textarea) textarea.value = code;
            if (langSelect) langSelect.value = language;
        };

        window.addEventListener('load', () => {
            initEditor();
            // If there was a pending update from before editor was ready, apply it now
            if (window._pendingEditorUpdate) {
                window.updateEditorContent(window._pendingEditorUpdate.code, window._pendingEditorUpdate.language);
                delete window._pendingEditorUpdate;
            }
        });
    })();
</script>
</body>
</html>
