<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Code to Flowchart | Monolith V1.0.2</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0e0e0e", "primary": "#aec6ff", "surface-variant": "#252626",
                        "primary-fixed": "#d8e2ff", "error-container": "#7f2927", "tertiary-fixed": "#d6d0f1",
                        "primary-fixed-dim": "#c3d4ff", "tertiary-container": "#d6d0f1", "inverse-primary": "#005ac6",
                        "on-primary-fixed-variant": "#0057bf", "on-background": "#e7e5e4", "error-dim": "#bb5551",
                        "outline-variant": "#484848", "on-primary-container": "#bdd0ff", "secondary-dim": "#9d9da4",
                        "error": "#ee7d77", "tertiary": "#e4dfff", "surface-dim": "#0e0e0e",
                        "on-primary-fixed": "#003c88", "on-secondary-container": "#bfbfc5", "secondary": "#9d9da4",
                        "on-tertiary-fixed-variant": "#534f6b", "on-secondary-fixed": "#3e3f45", "primary-dim": "#99b8ff",
                        "outline": "#767575", "tertiary-fixed-dim": "#c8c3e3", "on-secondary": "#1e2025",
                        "on-secondary-fixed-variant": "#5a5b61", "inverse-surface": "#fcf8f8", "on-error": "#490106",
                        "surface-container-high": "#1f2020", "on-primary": "#003d8a", "on-tertiary": "#524f6a",
                        "surface-container-highest": "#252626", "surface-container-low": "#131313", "surface-bright": "#2c2c2c",
                        "on-error-container": "#ff9993", "primary-container": "#004397", "surface-container-lowest": "#000000",
                        "surface-tint": "#aec6ff", "on-tertiary-container": "#494661", "background": "#0e0e0e",
                        "secondary-container": "#3a3b41", "on-surface": "#e7e5e4", "secondary-fixed": "#e2e2e9",
                        "inverse-on-surface": "#565554", "secondary-fixed-dim": "#d4d4db", "on-tertiary-fixed": "#36334d",
                        "on-surface-variant": "#acabaa", "surface-container": "#191a1a", "tertiary-dim": "#c8c3e3"
                    },
                    fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"] }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #252626; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484848; }
        #inputCode { resize: none; tab-size: 4; outline: none; }
        
        /* --- NEW: Dynamic Dark Mode Arrows (Nuclear Option) --- */
        html.dark .mermaid .edgePath path,
        html.dark .mermaid .edgePaths path,
        html.dark .mermaid path.path { 
            stroke: #aec6ff !important; 
        } 
        html.dark .mermaid marker path { 
            fill: #aec6ff !important; 
            stroke: #efe9ec !important; 
        }
        html.dark .mermaid .edgeLabel,
        html.dark .mermaid .label { 
            color: #aec6ff !important; 
            background-color: #aec6ff !important; 
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden h-screen flex flex-col">
    
    <header class="bg-[#131313] text-[#aec6ff] border-b border-outline-variant/10 flex justify-between items-center px-6 h-16 w-full z-50">
        <div class="flex items-center gap-4">
            <button class="p-2 text-[#acabaa] hover:bg-[#2c2c2c] transition-colors duration-200 rounded-lg active:scale-95" id="toggleSidebarBtn">
                <span class="material-symbols-outlined" data-icon="menu">menu</span>
            </button>
            <span class="text-xl font-bold tracking-tighter text-[#aec6ff] ml-2">Code to Flowchart</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 text-[#acabaa] hover:bg-[#2c2c2c] transition-colors duration-200 rounded-lg active:scale-95 transition-transform" id="themeToggle">
                <span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside id="sidebar" class="bg-[#131313] border-r border-outline-variant/10 flex flex-col z-40 overflow-hidden" style="width: 16rem; transition: all 0.3s ease;">
            <div class="p-6" style="min-width: 16rem;">
                <button class="w-full bg-primary text-on-primary font-bold py-3 rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-all text-xs uppercase tracking-widest shadow-lg shadow-primary/10">
                    <span class="material-symbols-outlined text-[18px]">add</span> New Project
                </button>
            </div>
            <div class="flex-1 overflow-y-auto px-4 space-y-8 pb-8" style="min-width: 16rem;">
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest px-2 mb-3">Saved Projects</p>
                    <a class="group text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest rounded-lg flex items-center justify-between px-3 py-2.5 transition-all text-xs" href="#">
                        <span class="truncate">Authentication Flow</span>
                    </a>
                </div>
            </div>
            <div class="p-6 border-t border-outline-variant/5" style="min-width: 16rem;">
                <div class="mb-2">
                    <h2 class="text-sm font-black text-white">Monolith</h2>
                    <p class="text-[10px] text-on-surface-variant font-medium">V1.0.2</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex overflow-hidden">
            <div class="flex flex-col md:flex-row w-full h-full bg-surface">
                
                <section class="w-full md:w-[40%] flex flex-col bg-surface border-r border-outline-variant/10 p-6 space-y-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-on-surface-variant text-[10px] font-black uppercase tracking-widest">Source Code</h3>
                    </div>
                    <div class="relative flex-1 group">
                        <div class="absolute inset-0 bg-primary/5 opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none rounded-xl"></div>
                        <textarea class="w-full h-full bg-surface-container-low text-on-surface font-mono text-sm p-6 rounded-xl border border-outline-variant/10 focus:ring-1 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/30" id="inputCode" spellcheck="false">def factorial_recursive(n):
    if n < 0:
        return "Not defined for negative numbers"
    elif n == 0 or n == 1:
        return 1
    else:
        return n * factorial_recursive(n - 1)

number = 5
print(f"The factorial of {number} is {factorial_recursive(number)}")</textarea>
                    </div>
                    <div class="flex items-center gap-3 pt-2">
                        <div class="relative flex-1">
                            <select class="w-full bg-surface-container-highest text-on-surface-variant text-xs font-medium py-3 px-4 rounded-lg border-none appearance-none focus:ring-2 focus:ring-primary/20 cursor-pointer" id="langSelect">
                                <option value="python">Python</option>
                                <option value="c">C Language</option>
                            </select>
                            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-sm" data-icon="expand_more">expand_more</span>
                        </div>
                        <button class="flex-[2] bg-gradient-to-r from-primary to-primary-dim text-on-primary font-bold text-xs py-3 px-6 rounded-lg shadow-lg shadow-primary/10 active:scale-95 transition-all flex items-center justify-center gap-2" id="updateBtn">
                            <span class="material-symbols-outlined text-[18px]" data-icon="sync">sync</span> Update Flowchart
                        </button>
                    </div>
                </section>

                <section class="w-full md:w-[60%] bg-surface-container-low p-6 flex flex-col relative">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-on-surface-variant text-[10px] font-black uppercase tracking-widest">Visualization</h3>
                    </div>
                    <div class="flex-1 bg-surface-container rounded-2xl relative overflow-hidden flex items-center justify-center border border-outline-variant/5 shadow-inner" id="graph-output">
                        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#aec6ff 1px, transparent 0); background-size: 24px 24px;"></div>
                        
                        <div class="w-full h-full overflow-auto p-6" id="chart-container" style="display: block;">
                            <div id="empty-state" class="flex flex-col items-center justify-center text-center h-full max-w-xs mx-auto animate-in fade-in duration-700">
                                <div class="w-16 h-16 rounded-3xl bg-surface-container-highest flex items-center justify-center mb-4 shadow-xl">
                                    <span class="material-symbols-outlined text-3xl text-primary/40" data-icon="schema">schema</span>
                                </div>
                                <p class="text-on-surface-variant text-xs font-medium leading-relaxed">
                                    Your flowchart will appear here. Paste your logic and click update to visualize.
                                </p>
                            </div>
                        </div>

                        <div class="hidden absolute inset-0 bg-surface-container/80 backdrop-blur-md flex items-center justify-center z-20" id="loader-overlay">
                            <div class="flex flex-col items-center">
                                <div class="relative w-12 h-12">
                                    <div class="absolute inset-0 border-4 border-primary/20 rounded-full"></div>
                                    <div class="absolute inset-0 border-4 border-primary rounded-full border-t-transparent animate-spin"></div>
                                </div>
                                <span class="mt-4 text-[10px] font-black uppercase tracking-[0.2em] text-primary">Generating Graph...</span>
                            </div>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web-tree-sitter@0.20.8/tree-sitter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.2.4/dist/mermaid.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
